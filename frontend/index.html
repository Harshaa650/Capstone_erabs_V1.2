<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600,700&display=swap" rel="stylesheet" />
    <title>ERABS — Enterprise Resource Allocation & Booking</title>
    <style>
      :root {
        --primary: #0b69ff;
        --primary-foreground: #ffffff;
        --secondary: #e8f0ff;
        --secondary-foreground: #053162;
        --background: #0a0e1a;
        --foreground: #ffffff;
        --card: #111827;
        --card-foreground: #ffffff;
        --border: #1e3a5f;
        --muted: #1a2332;
        --muted-foreground: #8b9db8;
        --accent: #0b69ff;
        --accent-foreground: #ffffff;
        --success: #12b76a;
        --success-foreground: #ffffff;
        --warning: #ffb020;
        --warning-foreground: #1f2d3d;
        --destructive: #ef4444;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --radius-xl: 16px;
      }
      body {
        margin: 0;
        padding: 0;
        background-color: var(--background);
        color: var(--foreground);
        font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
        overflow-x: hidden;
      }
      * { box-sizing: border-box; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: var(--background); }
      ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--primary); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
