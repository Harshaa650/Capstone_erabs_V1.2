services:
  postgres:
    image: postgres:16-alpine
    container_name: erabs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: erabs
    ports:
      - "5432:5432"
    volumes:
      - erabs_pgdata:/var/lib/postgresql/data

volumes:
  erabs_pgdata:
